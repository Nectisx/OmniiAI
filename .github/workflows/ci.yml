name: OmniAI CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ── Lint & Type Check ──────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install --include=dev

      - name: Build shared types
        run: npm run build:types

      - name: Generate Prisma client
        run: cd apps/backend && npx prisma generate

      - name: Type check backend
        run: cd apps/backend && npx tsc --noEmit

      - name: Type check frontend
        run: cd apps/frontend && npx tsc --noEmit

  # ── Build ──────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install --include=dev

      - name: Build shared types
        run: npm run build:types

      - name: Generate Prisma client
        run: cd apps/backend && npx prisma generate

      - name: Build backend
        run: npm run build:backend

      - name: Build frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:3001/api' }}
        run: npm run build:frontend

  # ── Deploy to Render (main only, si hooks configurés) ──────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy Backend to Render
        if: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK != '' }}
        run: |
          curl -fsSL -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json"

      - name: Deploy Frontend to Render
        if: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK != '' }}
        run: |
          curl -fsSL -X POST "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json"

      - name: Deploy Python Service to Render
        if: ${{ secrets.RENDER_PYTHON_DEPLOY_HOOK != '' }}
        run: |
          curl -fsSL -X POST "${{ secrets.RENDER_PYTHON_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json"

      - name: Notify deployment
        run: echo "✅ OmniAI déployé sur Render — $(date)"
